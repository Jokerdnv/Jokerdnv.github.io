<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Gartic.css">
    <title>Gartic Links</title>
</head>

<body>

<div class="links">
    <a id="garticLink" target="_blank">
        <img src="Gartic_logo.png" alt="Gartic Logo">
        Gartic - Last update: loading...
    </a>
</div>

<script>
fetch("https://docs.google.com/spreadsheets/d/1YO0jisQPK7iVEUVvAj-mlymxqHPwIzNsmV2xXQgo1aE/gviz/tq?tqx=out:json")
.then(res => res.text())
.then(data => {
    const json = JSON.parse(data.substring(47).slice(0, -2));
    
    const link = json.table.rows[0].c[1].v;
    const date = json.table.rows[0].c[2]?.v || "";

    const a = document.getElementById("garticLink");
    a.href = link;
    a.innerHTML = `<img src="Gartic_logo.png" alt="Gartic Logo"> Gartic - Last update: ${date}`;
});
</script>

</body>
